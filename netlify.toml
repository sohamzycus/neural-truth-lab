# Static Next.js export. Netlify UI: leave Build command + Publish directory EMPTY.
# ponytail: yarn.lock → Netlify uses yarn instead of npm (npm hangs with "Exit handler never called")

[build]
  command = "bash scripts/netlify-build.sh"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"
  YARN_VERSION = "1.22.22"
  YARN_FLAGS = "--network-timeout 600000"
  NODE_OPTIONS = "--no-network-family-autoselection"
