# Static Next.js export. Netlify UI: leave Build command + Publish directory EMPTY.

[build]
  command = "bash scripts/netlify-build.sh"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"
  # npm 10.8.x + Node 20 can hang with "Exit handler never called" on large installs
  NPM_VERSION = "10.6.0"
  NODE_OPTIONS = "--no-network-family-autoselection"
