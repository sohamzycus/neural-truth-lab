# Next.js 15 on Netlify — see https://docs.netlify.com/build/frameworks/framework-setup-guides/nextjs/overview/
#
# Do NOT set "Publish directory" or "Build command" in the Netlify UI (leave blank).

[build]
  command = "npm ci --include=dev --no-audit --no-fund && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION = "10.8.2"
